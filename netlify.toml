# Netlify builds and serves only the React frontend.
# The backend is deployed separately (see DEPLOYMENT.md).
[build]
  base = "frontend"
  publish = "build"
  command = "npm run build"

[build.environment]
  # Vite 8 requires Node >=20.19 or >=22.12.
  NODE_VERSION = "22"

# SPA fallback so client-side routes resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
